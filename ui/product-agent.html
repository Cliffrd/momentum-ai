<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f4f2ef;
      --surface:    #eae7e1;
      --border:     #d4d0c8;
      --border-2:   #b0aca4;
      --text:       #17161a;
      --text-2:     #4c4946;
      --text-3:     #9a9690;
      --accent:     #c4790c;
      --accent-dim: rgba(196, 121, 12, 0.1);
      --font:       -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.65;
      min-height: 100vh;
      padding: 0 24px 120px;
      -webkit-font-smoothing: antialiased;
    }

    /* Top accent bar */
    body::before {
      content: '';
      display: block;
      height: 2px;
      background: var(--accent);
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      padding: 68px 0 52px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 52px;
    }

    .header-eyebrow {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }

    header h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--text);
      line-height: 1.05;
      margin-bottom: 10px;
    }

    header p {
      font-size: 14px;
      color: var(--text-3);
      letter-spacing: 0.01em;
    }

    /* ── History Panel ── */
    .history-panel {
      margin-bottom: 44px;
    }

    .history-toggle {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      font-family: var(--font);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-3);
      transition: color 0.12s;
    }

    .history-toggle:hover { color: var(--text-2); }

    .toggle-arrow {
      width: 6px;
      height: 6px;
      border-right: 1.5px solid currentColor;
      border-bottom: 1.5px solid currentColor;
      transform: rotate(45deg);
      transition: transform 0.18s;
      position: relative;
      top: -1px;
    }

    .history-toggle[aria-expanded="true"] .toggle-arrow {
      transform: rotate(-135deg);
      top: 2px;
    }

    .history-body {
      display: none;
      margin-top: 18px;
    }

    .history-body.open { display: block; }

    .history-empty {
      font-size: 13px;
      color: var(--text-3);
      padding: 16px 0;
    }

    .history-cards {
      border: 1px solid var(--border);
      background: var(--border);
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .history-card {
      background: #fff;
      padding: 16px 20px;
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 18px;
      align-items: start;
    }

    .h-date {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      padding-top: 2px;
    }

    .h-tldr {
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-2);
    }

    .h-load {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-3);
      font-family: var(--font);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 7px 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.12s, color 0.12s;
    }

    .h-load:hover {
      border-color: var(--border-2);
      color: var(--text-2);
    }

    /* ── Input ── */
    .input-section { margin-bottom: 0; }

    .field { margin-bottom: 12px; }

    .field-label {
      display: block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 12px;
    }

    textarea {
      width: 100%;
      background: #fff;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.75;
      padding: 20px 22px;
      resize: vertical;
      min-height: 200px;
      outline: none;
      border-radius: 0;
      transition: border-color 0.12s, box-shadow 0.12s;
      -webkit-appearance: none;
    }

    textarea:focus {
      border-color: var(--border-2);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    textarea::placeholder { color: var(--text-3); }

    .actions {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 12px;
    }

    .btn-analyze {
      background: var(--text);
      color: var(--bg);
      border: none;
      font-family: var(--font);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 13px 28px;
      cursor: pointer;
      transition: opacity 0.12s;
    }

    .btn-analyze:hover { opacity: 0.75; }
    .btn-analyze:disabled { opacity: 0.25; cursor: not-allowed; }

    .action-hint { font-size: 12px; color: var(--text-3); }

    /* ── Error ── */
    .error-msg {
      display: none;
      margin-top: 24px;
      padding: 15px 20px;
      background: #fef0ee;
      border-left: 3px solid #c0392b;
      font-size: 13px;
      color: #8b2020;
      line-height: 1.55;
    }

    .error-msg.active { display: block; }

    /* ── Loading ── */
    .loading {
      display: none;
      align-items: center;
      gap: 14px;
      color: var(--text-3);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 40px;
    }

    .loading.active { display: flex; }

    .dot-pulse { display: flex; gap: 5px; align-items: center; }

    .dot-pulse span {
      width: 4px;
      height: 4px;
      background: var(--text-3);
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
    .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ── Results ── */
    .results { display: none; }
    .results.active { display: block; }

    /* TL;DR — the headline */
    .tldr-block {
      border-top: 1px solid var(--border);
      padding: 52px 0 60px;
      margin-top: 60px;
    }

    .tldr-eyebrow {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .tldr-text {
      font-size: 30px;
      font-weight: 600;
      line-height: 1.28;
      color: var(--text);
      letter-spacing: -0.03em;
      max-width: 640px;
    }

    /* Sections — two-column editorial grid */
    .results-body {
      border-top: 2px solid var(--text);
    }

    .result-section {
      display: grid;
      grid-template-columns: 152px 1fr;
      gap: 36px;
      padding: 44px 0;
      border-bottom: 1px solid var(--border);
    }

    .result-section:last-child { border-bottom: none; }

    .section-meta { padding-top: 2px; }

    .section-num {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--text-3);
      margin-bottom: 5px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
      line-height: 1.3;
    }

    /* Items */
    .item-list { list-style: none; }

    .item-list li {
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      line-height: 1.62;
      color: var(--text-2);
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .item-list li:first-child { border-top: 1px solid var(--border); }

    .item-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--text-3);
      flex-shrink: 0;
      margin-top: 9px;
    }

    /* Recurring badge */
    .recurring-badge {
      display: inline-flex;
      align-items: center;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 2px 6px;
      margin-left: 8px;
      white-space: nowrap;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    /* Hypothesis */
    .hypothesis-text {
      font-size: 15px;
      font-style: italic;
      color: var(--text-2);
      line-height: 1.72;
      padding: 22px 26px;
      border-left: 3px solid var(--accent);
      background: #fff;
    }

    /* PRD table */
    .prd-table {
      width: 100%;
      background: #fff;
      border: 1px solid var(--border);
    }

    .prd-row {
      display: grid;
      grid-template-columns: 152px 1fr;
      border-bottom: 1px solid var(--border);
    }

    .prd-row:last-child { border-bottom: none; }

    .prd-key {
      padding: 17px 18px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
    }

    .prd-val {
      padding: 17px 22px;
      font-size: 13.5px;
      line-height: 1.68;
      color: var(--text-2);
    }

    .prd-val ul { list-style: none; padding: 0; }

    .prd-val ul li { padding: 4px 0 4px 16px; position: relative; }

    .prd-val ul li::before {
      content: '·';
      position: absolute;
      left: 4px;
      color: var(--text-3);
    }

    /* ── Responsive ── */
    @media (max-width: 580px) {
      header h1 { font-size: 26px; }
      .tldr-text { font-size: 22px; }
      .result-section { grid-template-columns: 1fr; gap: 14px; }
      .history-card { grid-template-columns: 1fr; gap: 10px; }
      .prd-row { grid-template-columns: 1fr; }
      .prd-key { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

  <div class="container">

    <header>
      <div class="header-eyebrow">Signal Intelligence</div>
      <h1>Product Agent</h1>
      <p>Paste raw signals. Get a decision.</p>
    </header>

    <!-- Previous Analyses -->
    <div class="history-panel">
      <button class="history-toggle" id="history-toggle"
              aria-expanded="false" onclick="toggleHistory()">
        <span class="toggle-arrow"></span>
        <span id="history-label">Previous Analyses</span>
      </button>
      <div class="history-body" id="history-body"></div>
    </div>

    <!-- Input -->
    <div class="input-section">
      <div class="field">
        <label class="field-label" for="inputs">Product Inputs</label>
        <textarea
          id="inputs"
          placeholder="Paste customer interviews, feature requests, support tickets, sales call notes, NPS responses…"
        ></textarea>
      </div>

      <div class="actions">
        <button class="btn-analyze" id="analyze-btn" onclick="analyze()">Analyze</button>
        <span class="action-hint">Returns KEY_THEMES · OPPORTUNITIES · HYPOTHESIS · PRD_OUTLINE</span>
      </div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="loading" id="loading">
      <div class="dot-pulse"><span></span><span></span><span></span></div>
      <span>Analyzing inputs…</span>
    </div>

    <!-- Results -->
    <div class="results" id="results">

      <div class="tldr-block">
        <div class="tldr-eyebrow">The bottom line</div>
        <div class="tldr-text" id="tldr"></div>
      </div>

      <div class="results-body">

        <div class="result-section">
          <div class="section-meta">
            <div class="section-num">01</div>
            <div class="section-title">Key Themes</div>
          </div>
          <div><ul class="item-list" id="themes-list"></ul></div>
        </div>

        <div class="result-section">
          <div class="section-meta">
            <div class="section-num">02</div>
            <div class="section-title">Opportunities</div>
          </div>
          <div><ul class="item-list" id="opportunities-list"></ul></div>
        </div>

        <div class="result-section">
          <div class="section-meta">
            <div class="section-num">03</div>
            <div class="section-title">Hypothesis</div>
          </div>
          <div><div class="hypothesis-text" id="hypothesis"></div></div>
        </div>

        <div class="result-section">
          <div class="section-meta">
            <div class="section-num">04</div>
            <div class="section-title">PRD Outline</div>
          </div>
          <div><div class="prd-table" id="prd-table"></div></div>
        </div>

      </div>
    </div>
  </div>

  <script>
    // ── Storage ───────────────────────────────────────────────────────────────

    const STORAGE_KEY = 'product_analyses';
    const MAX_STORED  = 10;

    function loadHistory() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
      catch { return []; }
    }

    function saveAnalysis(entry) {
      const history = loadHistory();
      history.push(entry);
      if (history.length > MAX_STORED) history.splice(0, history.length - MAX_STORED);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    }

    // ── History Panel ─────────────────────────────────────────────────────────

    function toggleHistory() {
      const btn  = document.getElementById('history-toggle');
      const body = document.getElementById('history-body');
      const open = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', !open);
      if (!open) {
        renderHistoryBody();
        body.classList.add('open');
      } else {
        body.classList.remove('open');
      }
    }

    function fmtDate(iso) {
      const [, m, d] = iso.split('-').map(Number);
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return `${months[m - 1]} ${d}`;
    }

    function updateHistoryLabel() {
      const h = loadHistory();
      const label = document.getElementById('history-label');
      label.textContent = h.length > 0
        ? `Previous Analyses (${h.length})`
        : 'Previous Analyses';
    }

    function renderHistoryBody() {
      const body    = document.getElementById('history-body');
      const history = loadHistory();

      if (history.length === 0) {
        body.innerHTML = '<div class="history-empty">No previous analyses yet.</div>';
        return;
      }

      // Show last 5, most-recent first; map back to original index for loadSnippet
      const total  = history.length;
      const recent = history.slice(-5).reverse();

      body.innerHTML = `<div class="history-cards">${
        recent.map((entry, i) => {
          const origIdx = total - 1 - i;
          return `<div class="history-card">
            <div class="h-date">${fmtDate(entry.date)}</div>
            <div class="h-tldr">${esc(entry.tldr)}</div>
            <button class="h-load" onclick="loadSnippet(${origIdx})">Load</button>
          </div>`;
        }).join('')
      }</div>`;
    }

    function loadSnippet(idx) {
      const history = loadHistory();
      if (!history[idx]) return;
      document.getElementById('inputs').value = history[idx].input_snippet;
      document.getElementById('inputs').scrollIntoView({ behavior: 'smooth', block: 'center' });
      document.getElementById('inputs').focus();
    }

    // ── Recurring Theme Detection ─────────────────────────────────────────────

    const STOPWORDS = new Set([
      'with','that','this','from','have','been','they','their','more','most',
      'many','some','than','also','into','only','when','will','what','which',
      'were','then','them','such','very','just','each','over','both','even',
      'make','made','used','user','users','team','across','within','about',
      'because','feature','product','customer','customers',
    ]);

    function themeWords(theme) {
      return theme.toLowerCase()
        .replace(/[^a-z0-9 ]/g, ' ')
        .split(/\s+/)
        .filter(w => w.length > 3 && !STOPWORDS.has(w));
    }

    function themesOverlap(a, b) {
      const wa = new Set(themeWords(a));
      const wb = new Set(themeWords(b));
      let shared = 0;
      for (const w of wa) { if (wb.has(w)) shared++; }
      return shared >= 2;
    }

    // Returns set of current themes that also appeared in the most recent stored analysis.
    // Current + previous = 2 consecutive, satisfying the "2+" condition.
    function getRecurringThemes(currentThemes) {
      const history = loadHistory();
      if (history.length === 0) return new Set();
      const prevThemes = history[history.length - 1].key_themes || [];
      const recurring  = new Set();
      for (const cur of currentThemes) {
        for (const prev of prevThemes) {
          if (themesOverlap(cur, prev)) { recurring.add(cur); break; }
        }
      }
      return recurring;
    }

    // ── Analyze ───────────────────────────────────────────────────────────────

    async function analyze() {
      const input = document.getElementById('inputs').value.trim();
      if (!input) { document.getElementById('inputs').focus(); return; }

      const btn     = document.getElementById('analyze-btn');
      const loading = document.getElementById('loading');
      const results = document.getElementById('results');
      const errorEl = document.getElementById('error-msg');

      btn.disabled = true;
      loading.classList.add('active');
      results.classList.remove('active');
      errorEl.classList.remove('active');

      try {
        const resp = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ type: 'product', input }),
        });

        const data = await resp.json();
        if (!resp.ok || data.error) throw new Error(data.error || `Server error ${resp.status}`);

        const parsed = parseAnalysis(data.result);

        // Detect recurring before saving (avoids self-match)
        const recurring = getRecurringThemes(parsed.themes);

        // Persist to localStorage
        saveAnalysis({
          date:          new Date().toISOString().split('T')[0],
          tldr:          data.tldr.trim(),
          key_themes:    parsed.themes,
          input_snippet: input.slice(0, 100),
        });

        updateHistoryLabel();

        render(parsed, data.tldr, recurring);
        loading.classList.remove('active');
        results.classList.add('active');
        results.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } catch (err) {
        loading.classList.remove('active');
        showError(`Error: ${err.message}`);
      } finally {
        btn.disabled = false;
      }
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('active');
    }

    // ── Parsing ───────────────────────────────────────────────────────────────

    function parseAnalysis(text) {
      const sections = {};
      const re = /\*{0,2}(KEY_THEMES|OPPORTUNITIES|HYPOTHESIS|PRD_OUTLINE)\*{0,2}:?\*{0,2}([\s\S]*?)(?=\n\*{0,2}(?:KEY_THEMES|OPPORTUNITIES|HYPOTHESIS|PRD_OUTLINE)\*{0,2}:|$)/g;
      let m;
      while ((m = re.exec(text)) !== null) sections[m[1]] = m[2].trim();

      function parseBullets(str) {
        return str.split('\n')
          .map(l => l.replace(/^[-•*]\s+/, '').replace(/^\d+[.)]\s+/, '').trim())
          .filter(Boolean);
      }

      return {
        themes:        parseBullets(sections['KEY_THEMES']    || ''),
        opportunities: parseBullets(sections['OPPORTUNITIES'] || ''),
        hypothesis:    (sections['HYPOTHESIS'] || '').replace(/^["""'']|["""'']$/g, '').trim(),
        prd:           parsePRD(sections['PRD_OUTLINE'] || ''),
      };
    }

    function parsePRD(text) {
      const defs = [
        { key: 'Problem Statement', re: /problem\s+statement[:\s–—]+(.+?)(?=target\s+user|success\s+metrics|proposed\s+solution|open\s+question|$)/is },
        { key: 'Target User',       re: /target\s+user[:\s–—]+(.+?)(?=problem\s+statement|success\s+metrics|proposed\s+solution|open\s+question|$)/is },
        { key: 'Success Metrics',   re: /success\s+metrics[:\s–—]+([\s\S]+?)(?=problem\s+statement|target\s+user|proposed\s+solution|open\s+question|$)/i },
        { key: 'Proposed Solution', re: /proposed\s+solution[:\s–—]+([\s\S]+?)(?=problem\s+statement|target\s+user|success\s+metrics|open\s+question|$)/i },
        { key: 'Open Question',     re: /open\s+question[:\s–—]+(.+?)(?=problem\s+statement|target\s+user|success\s+metrics|proposed\s+solution|$)/is },
      ];

      const rows = [];
      for (const { key, re } of defs) {
        const match = text.match(re);
        if (!match) continue;
        const raw   = match[1].trim();
        const lines = raw.split('\n')
          .map(l => l.replace(/^[-•*]\s+/, '').replace(/^\d+[.)]\s+/, '').trim())
          .filter(Boolean);
        rows.push(lines.length > 1 ? { key, val: lines, isList: true } : { key, val: raw });
      }

      if (rows.length === 0) rows.push({ key: 'PRD Outline', val: text });
      return rows;
    }

    // ── Rendering ─────────────────────────────────────────────────────────────

    function render(data, tldr, recurring = new Set()) {
      document.getElementById('tldr').textContent = tldr;

      document.getElementById('themes-list').innerHTML = data.themes.map(t => {
        const badge = recurring.has(t)
          ? `<span class="recurring-badge">Recurring</span>`
          : '';
        return `<li><span class="item-dot"></span><span>${esc(t)}${badge}</span></li>`;
      }).join('');

      document.getElementById('opportunities-list').innerHTML =
        data.opportunities.map(o =>
          `<li><span class="item-dot"></span><span>${esc(o)}</span></li>`
        ).join('');

      document.getElementById('hypothesis').textContent = data.hypothesis;

      document.getElementById('prd-table').innerHTML = data.prd.map(row => {
        const valHtml = row.isList
          ? `<ul>${row.val.map(v => `<li>${esc(v)}</li>`).join('')}</ul>`
          : esc(row.val);
        return `<div class="prd-row"><div class="prd-key">${esc(row.key)}</div><div class="prd-val">${valHtml}</div></div>`;
      }).join('');
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Init ──────────────────────────────────────────────────────────────────

    document.addEventListener('DOMContentLoaded', updateHistoryLabel);
  </script>
</body>
</html>
